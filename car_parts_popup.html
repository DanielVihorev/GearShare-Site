<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car Part - GearShare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            padding: 20px;
        }

        /* Demo Button */
        .demo-btn {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .demo-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        /* Overlay */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .popup-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(-20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        /* Popup Container */
        .popup-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
        }

        /* Header */
        .popup-header {
            padding: 24px 24px 0 24px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 24px;
            position: relative;
        }

        .popup-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .popup-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #64748b;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #f1f5f9;
            color: #334155;
        }

        /* Form */
        .popup-form {
            padding: 0 24px 24px 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-input, .form-select, .form-textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-select {
            cursor: pointer;
        }

        /* Price Input Group */
        .price-input-group {
            position: relative;
        }

        .price-input-group::before {
            content: '$';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-weight: 600;
            z-index: 1;
        }

        .price-input-group .form-input {
            padding-left: 32px;
        }

        /* Image Upload */
        .image-upload {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            background: #f8fafc;
        }

        .image-upload:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }

        .image-upload.dragover {
            border-color: #3b82f6;
            background: #dbeafe;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            color: #94a3b8;
        }

        .upload-text {
            color: #64748b;
            margin-bottom: 8px;
        }

        .upload-subtext {
            color: #94a3b8;
            font-size: 12px;
        }

        .file-input {
            display: none;
        }

        /* Action Buttons */
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .btn-secondary {
            background: #f8fafc;
            color: #64748b;
            border-color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .popup-container {
                width: 95%;
                margin: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="demo-btn" onclick="openPopup()">Add New Car Part</button>

    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-container">
            <div class="popup-header">
                <h2 class="popup-title">Add New Car Part</h2>
                <p class="popup-subtitle">Fill in the details below to add a new car part to your inventory</p>
                <button class="close-btn" onclick="closePopup()">&times;</button>
            </div>

            <form class="popup-form" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="partName">Part Name</label>
                        <input type="text" id="partName" name="partName" class="form-input" placeholder="e.g., Front Brake Pads" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="partNumber">Part Number</label>
                        <input type="text" id="partNumber" name="partNumber" class="form-input" placeholder="e.g., BP-123456">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="category">Category</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            <option value="engine">Engine</option>
                            <option value="transmission">Transmission</option>
                            <option value="brakes">Brakes</option>
                            <option value="suspension">Suspension</option>
                            <option value="electrical">Electrical</option>
                            <option value="body">Body</option>
                            <option value="interior">Interior</option>
                            <option value="exhaust">Exhaust</option>
                            <option value="cooling">Cooling</option>
                            <option value="fuel">Fuel System</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="condition">Condition</label>
                        <select id="condition" name="condition" class="form-select" required>
                            <option value="">Select Condition</option>
                            <option value="new">New</option>
                            <option value="like-new">Like New</option>
                            <option value="excellent">Excellent</option>
                            <option value="good">Good</option>
                            <option value="fair">Fair</option>
                            <option value="for-parts">For Parts</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="make">Vehicle Make</label>
                        <input type="text" id="make" name="make" class="form-input" placeholder="e.g., Toyota, BMW, Ford" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="model">Vehicle Model</label>
                        <input type="text" id="model" name="model" class="form-input" placeholder="e.g., Camry, 3 Series, F-150" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="year">Vehicle Year</label>
                        <input type="number" id="year" name="year" class="form-input" placeholder="e.g., 2015" min="1900" max="2025" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="price">Price</label>
                        <div class="price-input-group">
                            <input type="number" id="price" name="price" class="form-input" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label" for="description">Description</label>
                        <textarea id="description" name="description" class="form-textarea" placeholder="Describe the part condition, compatibility, and any additional details..." required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Part Images</label>
                        <div class="image-upload" onclick="document.getElementById('images').click()">
                            <svg class="upload-icon" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                            </svg>
                            <div class="upload-text">Click to upload images or drag and drop</div>
                            <div class="upload-subtext">PNG, JPG, GIF up to 10MB each</div>
                        </div>
                        <input type="file" id="images" name="images" class="file-input" multiple accept="image/*">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closePopup()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Car Part</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openPopup() {
            document.getElementById('popup-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePopup() {
            document.getElementById('popup-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close popup when clicking overlay
        document.getElementById('popup-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closePopup();
            }
        });

        // Close popup with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePopup();
            }
        });

        // Handle form submission
        function handleSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const partData = {
                partName: formData.get('partName'),
                partNumber: formData.get('partNumber'),
                category: formData.get('category'),
                condition: formData.get('condition'),
                make: formData.get('make'),
                model: formData.get('model'),
                year: parseInt(formData.get('year')),
                price: parseFloat(formData.get('price')),
                description: formData.get('description'),
                images: formData.getAll('images')
            };

            console.log('Car part data to be sent to database:', partData);
            
            // Here you would typically send the data to your backend API
            // Example:
            // fetch('/api/car-parts', {
            //     method: 'POST',
            //     headers: {
            //         'Content-Type': 'application/json',
            //     },
            //     body: JSON.stringify(partData)
            // })
            // .then(response => response.json())
            // .then(data => {
            //     console.log('Success:', data);
            //     closePopup();
            //     // Show success message or redirect
            // })
            // .catch(error => {
            //     console.error('Error:', error);
            //     // Show error message
            // });

            alert('Car part data logged to console. Ready to be sent to your database!');
            closePopup();
            event.target.reset();
        }

        // Handle drag and drop for image upload
        const imageUpload = document.querySelector('.image-upload');
        const fileInput = document.getElementById('images');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            imageUpload.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            imageUpload.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            imageUpload.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            imageUpload.classList.add('dragover');
        }

        function unhighlight(e) {
            imageUpload.classList.remove('dragover');
        }

        imageUpload.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
        }
    </script>
</body>
</html>
