spring.application.name=gearshare-refresh-tokens

# H2 in-memory database (swap for PostgreSQL/MSSQL in production)
spring.datasource.url=jdbc:h2:mem:gearshare_auth;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# JWT
app.jwt.secret=${JWT_SECRET:gearshare-super-secret-key-change-in-production-min32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

server.port=8081
