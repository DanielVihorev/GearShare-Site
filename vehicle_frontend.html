<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare - Vehicle Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
        }

        .auth-section {
            margin-bottom: 30px;
        }

        .auth-forms {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .auth-form {
            flex: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .auth-form:hover {
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff7b7b, #ff9a9e);
        }

        .btn-vote {
            padding: 8px 16px;
            margin: 0 5px;
            font-size: 14px;
        }

        .btn-like {
            background: linear-gradient(45deg, #4CAF50, #45a049);
        }

        .btn-dislike {
            background: linear-gradient(45deg, #f44336, #da190b);
        }

        .vehicle-form {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .vehicle-form:hover {
            border-color: rgba(102, 126, 234, 0.3);
        }

        .vehicle-form h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .vehicle-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .vehicle-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .vehicle-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
        }

        .vehicle-type {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .vehicle-info {
            margin-bottom: 15px;
        }

        .vehicle-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .vehicle-details {
            color: #666;
            line-height: 1.5;
        }

        .vote-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .vote-counts {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #666;
        }

        .vote-count {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vote-buttons {
            display: flex;
            gap: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 768px) {
            .auth-forms {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .vehicles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 GearShare Vehicle Manager</h1>
            <p>Save, manage, and vote on vehicles</p>
        </div>

        <div id="alertContainer"></div>

        <!-- Vehicle Form -->
        <div class="vehicle-form">
            <h2>Add Your Vehicle</h2>
            <form id="vehicleForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="vehicleType">Vehicle Type</label>
                        <select id="vehicleType" name="vehicle_type" required>
                            <option value="">Select Type</option>
                            <option value="Car">Car</option>
                            <option value="Truck">Truck</option>
                            <option value="SUV">SUV</option>
                            <option value="Motorcycle">Motorcycle</option>
                            <option value="Van">Van</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="vehicleYear">Year</label>
                        <input type="number" id="vehicleYear" name="year" min="1900" max="2026" required>
                    </div>

                    <div class="form-group">
                        <label for="vehicleMake">Make</label>
                        <input type="text" id="vehicleMake" name="make" placeholder="e.g., Toyota, Ford, BMW" required>
                    </div>

                    <div class="form-group">
                        <label for="vehicleModel">Model</label>
                        <input type="text" id="vehicleModel" name="model" placeholder="e.g., Camry, F-150, X5" required>
                    </div>

                    <div class="form-group">
                        <label for="vehicleRegion">Region</label>
                        <select id="vehicleRegion" name="region" required>
                            <option value="">Select Region</option>
                            <option value="European">European</option>
                            <option value="American">American</option>
                            <option value="Asian">Asian</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn">💾 Save Vehicle</button>
            </form>
        </div>

        <!-- Recently Added Vehicles -->
        <div>
            <h2>Recently Added Vehicles</h2>
            <div id="recentVehiclesContainer" class="vehicles-grid">
                <div class="loading">Loading vehicles...</div>
            </div>
        </div>

        <!-- All Vehicles Section -->
        <div id="allVehiclesSection" class="hidden">
            <h2>All Vehicles</h2>
            <div id="allVehiclesContainer" class="vehicles-grid">
                <div class="loading">Loading vehicles...</div>
            </div>
        </div>
    </div>

    <script>
        // Utility functions
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Vehicle management - simplified for no-auth
        async function saveVehicle(vehicleData) {
            try {
                // For demo purposes, we'll simulate saving to localStorage
                // In production, this would go to your MySQL database
                const vehicles = JSON.parse(localStorage.getItem('vehicles') || '[]');
                const newVehicle = {
                    id: Date.now(),
                    ...vehicleData,
                    created_at: new Date().toISOString(),
                    likes: 0,
                    dislikes: 0
                };
                
                vehicles.unshift(newVehicle);
                localStorage.setItem('vehicles', JSON.stringify(vehicles));
                
                showAlert('Vehicle saved successfully!');
                document.getElementById('vehicleForm').reset();
                loadRecentVehicles();
                
                // Set current year as default again
                const currentYear = new Date().getFullYear();
                document.getElementById('vehicleYear').value = currentYear;
                
            } catch (error) {
                showAlert('Failed to save vehicle: ' + error.message, 'error');
            }
        }

        function loadRecentVehicles() {
            try {
                const vehicles = JSON.parse(localStorage.getItem('vehicles') || '[]');
                const recentVehicles = vehicles.slice(0, 6); // Show last 6 vehicles
                renderVehicles(recentVehicles, 'recentVehiclesContainer', false);
            } catch (error) {
                document.getElementById('recentVehiclesContainer').innerHTML = 
                    '<div class="alert alert-error">Failed to load vehicles</div>';
            }
        }

        // Render function simplified for no voting
        function renderVehicles(vehicles, containerId) {
            const container = document.getElementById(containerId);
            
            if (!vehicles || vehicles.length === 0) {
                container.innerHTML = '<div class="loading">No vehicles added yet. Add your first vehicle above!</div>';
                return;
            }

            container.innerHTML = vehicles.map(vehicle => `
                <div class="vehicle-card">
                    <div class="vehicle-header">
                        <div class="vehicle-type">${vehicle.vehicle_type}</div>
                        <small>${new Date(vehicle.created_at).toLocaleDateString()}</small>
                    </div>
                    
                    <div class="vehicle-info">
                        <h3>${vehicle.year} ${vehicle.make} ${vehicle.model}</h3>
                        <div class="vehicle-details">
                            <p><strong>Region:</strong> ${vehicle.region}</p>
                            <p><strong>Added:</strong> ${new Date(vehicle.created_at).toLocaleDateString()} at ${new Date(vehicle.created_at).toLocaleTimeString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Event listeners - simplified
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const vehicleData = {
                vehicle_type: formData.get('vehicle_type'),
                year: parseInt(formData.get('year')),
                make: formData.get('make').trim(),
                model: formData.get('model').trim(),
                region: formData.get('region')
            };
            
            // Basic validation
            if (!vehicleData.make || !vehicleData.model) {
                showAlert('Please enter both make and model', 'error');
                return;
            }
            
            await saveVehicle(vehicleData);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadRecentVehicles();
            
            // Set current year as default
            const currentYear = new Date().getFullYear();
            document.getElementById('vehicleYear').value = currentYear;
        });
